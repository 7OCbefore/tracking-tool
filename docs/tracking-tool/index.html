<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#1890ff">
<title>快递单号管理</title>
<link rel="manifest" href="manifest.json">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f5f5f5;
  color: #333;
  font-size: 16px;
  line-height: 1.5;
  overscroll-behavior: none;
}

/* === Screen Management === */
.screen {
  display: none;
  min-height: 100dvh;
  flex-direction: column;
}
.screen.active {
  display: flex;
}

/* === Header === */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: #fff;
  border-bottom: 1px solid #e8e8e8;
  position: sticky;
  top: 0;
  z-index: 10;
  min-height: 52px;
}

header h1 {
  font-size: 18px;
  font-weight: 600;
  color: #1a1a1a;
}

.header-btn {
  background: none;
  border: none;
  font-size: 16px;
  color: #1890ff;
  padding: 8px 4px;
  cursor: pointer;
  min-width: 60px;
  text-align: left;
}

#stats {
  font-size: 13px;
  color: #888;
}

/* === Search Bar === */
#search-bar {
  display: flex;
  gap: 0;
  padding: 10px 16px;
  background: #fff;
  border-bottom: 1px solid #f0f0f0;
  position: sticky;
  top: 52px;
  z-index: 9;
}

#search-input {
  flex: 1;
  height: 44px;
  padding: 0 14px;
  border: 1px solid #e0e0e0;
  border-radius: 22px;
  font-size: 16px;
  outline: none;
  background: #f8f8f8;
  transition: border-color 0.2s, background 0.2s;
}

#search-input:focus {
  border-color: #1890ff;
  background: #fff;
}

#btn-clear-search {
  position: absolute;
  right: 24px;
  top: 50%;
  transform: translateY(-50%);
  background: #c0c0c0;
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 22px;
  height: 22px;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

/* === Card List === */
#card-list {
  flex: 1;
  padding: 12px 16px;
  padding-bottom: 80px;
}

.record-card {
  background: #fff;
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  cursor: pointer;
  transition: box-shadow 0.2s;
  position: relative;
  border-left: 4px solid #ffa940;
}

.record-card.received {
  border-left-color: #73d13d;
}

.record-card:active {
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.card-number {
  font-size: 18px;
  font-weight: 600;
  font-family: "Courier New", monospace;
  letter-spacing: 1px;
  color: #1a1a1a;
  margin-bottom: 6px;
  word-break: break-all;
}

.card-meta {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  font-size: 14px;
  color: #666;
}

.card-meta span {
  display: flex;
  align-items: center;
  gap: 3px;
}

.card-status {
  position: absolute;
  top: 14px;
  right: 14px;
  font-size: 12px;
  padding: 3px 10px;
  border-radius: 10px;
  font-weight: 500;
}

.card-status.pending {
  background: #fff7e6;
  color: #d46b08;
}

.card-status.received {
  background: #f6ffed;
  color: #389e0d;
}

.card-date {
  font-size: 12px;
  color: #bbb;
  margin-top: 6px;
}

/* === Empty State === */
#empty-state {
  text-align: center;
  padding: 80px 20px;
}

#empty-state .empty-icon {
  font-size: 48px;
  margin-bottom: 16px;
}

#empty-state p {
  font-size: 16px;
  color: #999;
}

#empty-state .empty-hint {
  font-size: 14px;
  color: #bbb;
  margin-top: 8px;
}

/* === FAB (Floating Action Buttons) === */
.fab {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: #1890ff;
  color: #fff;
  border: none;
  font-size: 28px;
  line-height: 1;
  box-shadow: 0 4px 12px rgba(24,144,255,0.4);
  cursor: pointer;
  z-index: 20;
  transition: transform 0.2s, box-shadow 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.fab:active {
  transform: scale(0.92);
  box-shadow: 0 2px 6px rgba(24,144,255,0.3);
}

.fab-scan {
  position: fixed;
  bottom: 92px;
  right: 24px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: #52c41a;
  color: #fff;
  border: none;
  font-size: 24px;
  box-shadow: 0 4px 12px rgba(82,196,26,0.4);
  cursor: pointer;
  z-index: 20;
  transition: transform 0.2s, box-shadow 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.fab-scan:active {
  transform: scale(0.92);
  box-shadow: 0 2px 6px rgba(82,196,26,0.3);
}

/* === Add Form Screen === */
#screen-add {
  background: #fff;
}

.form-group {
  padding: 16px 20px 0;
}

.form-group label {
  display: block;
  font-size: 14px;
  font-weight: 500;
  color: #555;
  margin-bottom: 6px;
}

.form-group input {
  width: 100%;
  height: 48px;
  padding: 0 14px;
  border: 1px solid #e0e0e0;
  border-radius: 10px;
  font-size: 17px;
  outline: none;
  transition: border-color 0.2s;
  background: #fafafa;
}

.form-group input:focus {
  border-color: #1890ff;
  background: #fff;
  box-shadow: 0 0 0 3px rgba(24,144,255,0.1);
}

.form-group input::placeholder {
  color: #c0c0c0;
}

.form-actions {
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.btn-primary {
  height: 50px;
  border: none;
  border-radius: 10px;
  font-size: 17px;
  font-weight: 500;
  background: #1890ff;
  color: #fff;
  cursor: pointer;
  transition: background 0.2s;
}

.btn-primary:active {
  background: #096dd9;
}

.btn-secondary {
  height: 50px;
  border: 1px solid #d9d9d9;
  border-radius: 10px;
  font-size: 16px;
  background: #fff;
  color: #555;
  cursor: pointer;
  transition: background 0.2s;
}

.btn-secondary:active {
  background: #f5f5f5;
}

.btn-danger {
  height: 50px;
  border: 1px solid #ff4d4f;
  border-radius: 10px;
  font-size: 16px;
  background: #fff;
  color: #ff4d4f;
  cursor: pointer;
  transition: background 0.2s;
}

.btn-danger:active {
  background: #fff2f0;
}

.btn-large {
  width: 100%;
}

/* === Detail Screen === */
#detail-content {
  padding: 20px;
  flex: 1;
}

.detail-field {
  margin-bottom: 18px;
}

.detail-field label {
  font-size: 13px;
  color: #999;
  margin-bottom: 4px;
  display: block;
}

.detail-value {
  font-size: 17px;
  color: #333;
  word-break: break-all;
}

.detail-value.large {
  font-size: 22px;
  font-weight: 600;
  font-family: "Courier New", monospace;
  letter-spacing: 1px;
}

.detail-actions {
  margin-top: 32px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* === Match Highlight === */
.highlight {
  background: #fff3cd;
  padding: 1px 3px;
  border-radius: 2px;
}

/* === Utility === */
.hidden {
  display: none !important;
}

/* === Camera Overlay === */
#camera-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000;
  z-index: 100;
  display: flex;
  flex-direction: column;
}

#camera-overlay.hidden {
  display: none;
}

#camera-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: rgba(0,0,0,0.8);
  color: #fff;
  z-index: 2;
}

#camera-header .header-btn {
  color: #fff;
}

#camera-status {
  font-size: 14px;
  color: #ccc;
}

#camera-view {
  flex: 1;
  width: 100%;
  object-fit: cover;
}

#scan-result {
  padding: 16px;
  background: rgba(0,0,0,0.85);
  color: #fff;
  text-align: center;
  font-size: 15px;
  min-height: 60px;
}

#scan-result .scanned-number {
  font-size: 20px;
  font-weight: 600;
  font-family: "Courier New", monospace;
  color: #52c41a;
  letter-spacing: 1px;
}

#scan-result .scan-match {
  color: #52c41a;
  font-weight: 500;
}

#scan-result .scan-no-match {
  color: #ff4d4f;
}

#scan-result .scan-retry-btn {
  margin-top: 8px;
  padding: 8px 20px;
  border: 1px solid #fff;
  border-radius: 8px;
  background: transparent;
  color: #fff;
  font-size: 15px;
  cursor: pointer;
}
</style>
</head>
<body>

<!-- ====== Screen 1: Main List ====== -->
<div id="screen-list" class="screen active">
  <header>
    <h1>快递单号</h1>
    <div id="stats"></div>
  </header>

  <div id="search-bar">
    <input type="search" id="search-input" placeholder="搜索单号、客户、地区..." autocomplete="off">
    <button id="btn-clear-search" class="hidden">x</button>
  </div>

  <div id="card-list">
    <!-- Cards rendered by JS -->
  </div>

  <div id="empty-state" class="hidden">
    <div class="empty-icon">📦</div>
    <p>还没有快递记录</p>
    <p class="empty-hint">点下方按钮添加第一条</p>
  </div>

  <button id="btn-add" class="fab">+</button>
  <button id="btn-scan" class="fab-scan">📷</button>
</div>

<!-- ====== Camera overlay (scan barcode) ====== -->
<div id="camera-overlay" class="hidden">
  <div id="camera-header">
    <button id="btn-close-camera" class="header-btn">← 关闭</button>
    <span id="camera-status">对准条形码</span>
  </div>
  <video id="camera-view" autoplay playsinline></video>
  <div id="scan-result"></div>
</div>

<!-- ====== Screen 2: Add Record ====== -->
<div id="screen-add" class="screen">
  <header>
    <button id="btn-back-from-add" class="header-btn">← 返回</button>
    <h1>添加快递</h1>
    <div></div>
  </header>

  <form id="add-form">
    <div class="form-group">
      <label for="input-number">快递单号</label>
      <input type="text" id="input-number" required placeholder="输入或粘贴快递单号" autocomplete="off">
    </div>
    <div class="form-group">
      <label for="input-customer">客户名称</label>
      <input type="text" id="input-customer" required placeholder="输入客户名称" autocomplete="off">
    </div>
    <div class="form-group">
      <label for="input-region">地区</label>
      <input type="text" id="input-region" required placeholder="如：上海、北京、广东" autocomplete="off">
    </div>
    <div class="form-group">
      <label for="input-notes">备注（可选）</label>
      <input type="text" id="input-notes" placeholder="如：订单号、商品名称" autocomplete="off">
    </div>

    <div class="form-actions">
      <button type="submit" id="btn-save" class="btn-primary">保存</button>
      <button type="button" id="btn-save-continue" class="btn-secondary">保存并继续添加</button>
    </div>
  </form>
</div>

<!-- ====== Screen 3: Record Detail ====== -->
<div id="screen-detail" class="screen">
  <header>
    <button id="btn-back-from-detail" class="header-btn">← 返回</button>
    <h1>记录详情</h1>
    <div></div>
  </header>

  <div id="detail-content">
    <div class="detail-field">
      <label>快递单号</label>
      <div id="detail-number" class="detail-value large"></div>
    </div>
    <div class="detail-field">
      <label>客户名称</label>
      <div id="detail-customer" class="detail-value"></div>
    </div>
    <div class="detail-field">
      <label>地区</label>
      <div id="detail-region" class="detail-value"></div>
    </div>
    <div class="detail-field">
      <label>录入日期</label>
      <div id="detail-date" class="detail-value"></div>
    </div>
    <div class="detail-field">
      <label>备注</label>
      <div id="detail-notes" class="detail-value"></div>
    </div>
    <div class="detail-field">
      <label>状态</label>
      <div id="detail-status" class="detail-value"></div>
    </div>

    <div class="detail-actions">
      <button id="btn-toggle-receive" class="btn-primary btn-large">标记为已收到</button>
      <button id="btn-delete" class="btn-danger btn-large">删除此记录</button>
    </div>
  </div>
</div>

<script>
// === Data Layer ===

const STORAGE_KEY = 'tracking_data_v1';

let appData = [];

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    appData = raw ? JSON.parse(raw) : [];
  } catch (e) {
    appData = [];
  }
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
}

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function addRecord(number, customer, region, notes) {
  const record = {
    id: generateId(),
    number: number.trim(),
    customer: customer.trim(),
    region: region.trim(),
    notes: notes ? notes.trim() : '',
    date: new Date().toLocaleDateString('zh-CN', {
      year: 'numeric', month: '2-digit', day: '2-digit'
    }),
    received: false,
    receivedAt: null,
    createdAt: Date.now()
  };
  appData.unshift(record);
  saveData();
  return record;
}

function deleteRecord(id) {
  appData = appData.filter(r => r.id !== id);
  saveData();
}

function toggleReceived(id) {
  const record = appData.find(r => r.id === id);
  if (!record) return;
  record.received = !record.received;
  record.receivedAt = record.received ? Date.now() : null;
  saveData();
}

function getFilteredData(query) {
  if (!query) return appData;
  const q = query.trim().toLowerCase();
  return appData.filter(r =>
    r.number.toLowerCase().includes(q) ||
    r.customer.toLowerCase().includes(q) ||
    r.region.toLowerCase().includes(q) ||
    (r.notes && r.notes.toLowerCase().includes(q))
  );
}

// === Render ===

function render() {
  var query = document.getElementById('search-input').value;
  var data = getFilteredData(query);
  var container = document.getElementById('card-list');
  var emptyState = document.getElementById('empty-state');
  var statsEl = document.getElementById('stats');
  var clearBtn = document.getElementById('btn-clear-search');

  // Stats
  var total = appData.length;
  var received = appData.filter(function(r) { return r.received; }).length;
  var pending = total - received;
  statsEl.textContent = '共' + total + '条 · 已收' + received + ' · 待收' + pending;

  // Clear button visibility
  if (query) {
    clearBtn.classList.remove('hidden');
  } else {
    clearBtn.classList.add('hidden');
  }

  // Empty state or cards
  if (data.length === 0) {
    container.innerHTML = '';
    emptyState.classList.remove('hidden');
    if (query) {
      emptyState.querySelector('p').textContent = '没有匹配的记录';
      emptyState.querySelector('.empty-hint').textContent = '试试其他关键词';
    } else {
      emptyState.querySelector('p').textContent = '还没有快递记录';
      emptyState.querySelector('.empty-hint').textContent = '点 + 按钮添加第一条';
    }
    return;
  }

  emptyState.classList.add('hidden');
  container.innerHTML = data.map(function(record) {
    var statusClass = record.received ? 'received' : 'pending';
    var statusText = record.received ? '已收到' : '待收件';
    var notesHtml = record.notes ? '<div class="card-meta"><span>📝 ' + hl(record.notes, query) + '</span></div>' : '';
    return '<div class="record-card ' + statusClass + '" data-id="' + record.id + '" onclick="showDetail(\'' + record.id + '\')">' +
      '<div class="card-number">' + hl(record.number, query) + '</div>' +
      '<div class="card-meta">' +
        '<span>👤 ' + hl(record.customer, query) + '</span>' +
        '<span>📍 ' + hl(record.region, query) + '</span>' +
      '</div>' +
      notesHtml +
      '<span class="card-status ' + statusClass + '">' + statusText + '</span>' +
      '<div class="card-date">' + record.date + '</div>' +
    '</div>';
  }).join('');
}

function hl(text, query) {
  if (!text) return '';
  if (!query) return escapeHtml(text);
  var q = query.trim().toLowerCase();
  var idx = text.toLowerCase().indexOf(q);
  if (idx === -1) return escapeHtml(text);
  var before = escapeHtml(text.slice(0, idx));
  var match = escapeHtml(text.slice(idx, idx + q.length));
  var after = escapeHtml(text.slice(idx + q.length));
  return before + '<span class="highlight">' + match + '</span>' + after;
}

function escapeHtml(text) {
  var div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// === Init ===
loadData();
render();

// === Screen Navigation ===

function showScreen(screenId) {
  var screens = document.querySelectorAll('.screen');
  for (var i = 0; i < screens.length; i++) {
    screens[i].classList.remove('active');
  }
  document.getElementById(screenId).classList.add('active');
}

// === Form Handlers ===

document.addEventListener('DOMContentLoaded', function() {

  // FAB → show add screen
  document.getElementById('btn-add').addEventListener('click', function() {
    document.getElementById('add-form').reset();
    showScreen('screen-add');
    setTimeout(function() {
      document.getElementById('input-number').focus();
    }, 300);
  });

  // Back from add screen
  document.getElementById('btn-back-from-add').addEventListener('click', function() {
    showScreen('screen-list');
    render();
  });

  // Save
  document.getElementById('add-form').addEventListener('submit', function(e) {
    e.preventDefault();
    var number = document.getElementById('input-number').value.trim();
    var customer = document.getElementById('input-customer').value.trim();
    var region = document.getElementById('input-region').value.trim();
    var notes = document.getElementById('input-notes').value.trim();

    if (!number || !customer || !region) {
      alert('请填写快递单号、客户名称和地区');
      return;
    }

    addRecord(number, customer, region, notes);
    this.reset();
    showScreen('screen-list');
    render();
  });

  // Save and continue adding
  document.getElementById('btn-save-continue').addEventListener('click', function() {
    var number = document.getElementById('input-number').value.trim();
    var customer = document.getElementById('input-customer').value.trim();
    var region = document.getElementById('input-region').value.trim();
    var notes = document.getElementById('input-notes').value.trim();

    if (!number || !customer || !region) {
      alert('请填写快递单号、客户名称和地区');
      return;
    }

    addRecord(number, customer, region, notes);
    document.getElementById('add-form').reset();
    setTimeout(function() {
      document.getElementById('input-number').focus();
    }, 200);
  });

  // Search with real-time filtering
  document.getElementById('search-input').addEventListener('input', function() {
    render();
  });

  // Clear search button
  document.getElementById('btn-clear-search').addEventListener('click', function() {
    document.getElementById('search-input').value = '';
    document.getElementById('search-input').focus();
    render();
  });

});

// === Detail Screen ===

var currentDetailId = null;

function showDetail(id) {
  currentDetailId = id;
  var record = appData.find(function(r) { return r.id === id; });
  if (!record) return;

  document.getElementById('detail-number').textContent = record.number;
  document.getElementById('detail-customer').textContent = record.customer;
  document.getElementById('detail-region').textContent = record.region;
  document.getElementById('detail-date').textContent = record.date;
  document.getElementById('detail-notes').textContent = record.notes || '无';

  var statusEl = document.getElementById('detail-status');
  var toggleBtn = document.getElementById('btn-toggle-receive');

  if (record.received) {
    statusEl.textContent = '已收到';
    statusEl.style.color = '#389e0d';
    toggleBtn.textContent = '标记为未收到';
    toggleBtn.className = 'btn-secondary btn-large';
  } else {
    statusEl.textContent = '待收件';
    statusEl.style.color = '#d46b08';
    toggleBtn.textContent = '标记为已收到';
    toggleBtn.className = 'btn-primary btn-large';
  }

  showScreen('screen-detail');
}

document.addEventListener('DOMContentLoaded', function() {

  // Back from detail
  document.getElementById('btn-back-from-detail').addEventListener('click', function() {
    showScreen('screen-list');
    render();
  });

  // Toggle received status
  document.getElementById('btn-toggle-receive').addEventListener('click', function() {
    if (currentDetailId) {
      toggleReceived(currentDetailId);
      showDetail(currentDetailId);
      render();
    }
  });

  // Delete with confirmation
  document.getElementById('btn-delete').addEventListener('click', function() {
    if (!currentDetailId) return;
    if (confirm('确定要删除这条记录吗？')) {
      deleteRecord(currentDetailId);
      currentDetailId = null;
      showScreen('screen-list');
      render();
    }
  });

});


// === Barcode Scanning (Android Chrome BarcodeDetector API) ===

var barcodeDetector = null;
var scanStream = null;

function isScanSupported() {
  if (!('BarcodeDetector' in window)) return false;
  return true;
}

function initScanSupport() {
  var scanBtn = document.getElementById('btn-scan');
  if (!isScanSupported()) {
    scanBtn.classList.add('hidden');
    return;
  }
  if ('BarcodeDetector' in window && BarcodeDetector.getSupportedFormats) {
    BarcodeDetector.getSupportedFormats().then(function(formats) {
      var supported = formats.some(function(f) {
        return ['code_128', 'code_39', 'ean_13', 'ean_8', 'upc_a', 'upc_e', 'itf'].indexOf(f) !== -1;
      });
      if (!supported) scanBtn.classList.add('hidden');
    }).catch(function() {
      // Keep button visible, let it fail gracefully at scan time
    });
  }
}

document.addEventListener('DOMContentLoaded', function() {
  initScanSupport();
  document.getElementById('btn-scan').addEventListener('click', startScanner);
  document.getElementById('btn-close-camera').addEventListener('click', stopScanner);
});

function startScanner() {
  var overlay = document.getElementById('camera-overlay');
  var video = document.getElementById('camera-view');
  var status = document.getElementById('camera-status');
  var resultDiv = document.getElementById('scan-result');
  overlay.classList.remove('hidden');
  resultDiv.innerHTML = '正在启动相机...';

  try {
    barcodeDetector = new BarcodeDetector({
      formats: ['code_128', 'code_39', 'ean_13', 'ean_8', 'upc_a', 'upc_e', 'itf']
    });
  } catch (e) {
    resultDiv.innerHTML = '<span style="color:#ff4d4f">此设备不支持扫码功能，请使用搜索</span>';
    setTimeout(stopScanner, 2000);
    return;
  }

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } }
  }).then(function(stream) {
    scanStream = stream;
    video.srcObject = stream;
    return video.play();
  }).then(function() {
    status.textContent = '对准面单条形码';
    resultDiv.innerHTML = '正在识别...';
    scanLoop(video, resultDiv, status);
  }).catch(function(e) {
    resultDiv.innerHTML = '<span style="color:#ff4d4f">无法打开相机</span>';
    setTimeout(stopScanner, 1500);
  });
}

function stopScanner() {
  var overlay = document.getElementById('camera-overlay');
  overlay.classList.add('hidden');
  if (scanStream) {
    scanStream.getTracks().forEach(function(t) { t.stop(); });
    scanStream = null;
  }
  barcodeDetector = null;
}

var scanLoopActive = false;

function scanLoop(video, resultDiv, statusEl) {
  if (scanLoopActive) return;
  scanLoopActive = true;

  var scanCount = 0;
  var lastNumber = '';

  function tick() {
    if (!scanLoopActive) return;

    barcodeDetector.detect(video).then(function(barcodes) {
      if (barcodes.length > 0) {
        var number = barcodes[0].rawValue.trim();
        if (number !== lastNumber) {
          lastNumber = number;
          scanCount++;
          var matches = getFilteredData(number);
          if (matches.length > 0) {
            var record = matches[0];
            resultDiv.innerHTML =
              '<div class="scanned-number">' + escapeHtml(number) + '</div>' +
              '<div class="scan-match">已匹配：' + escapeHtml(record.customer) +
              '（' + escapeHtml(record.region) + '）' +
              (record.received ? ' · 已收到' : ' · 待收件') + '</div>' +
              '<button class="scan-retry-btn" onclick="showMatchedRecord()">查看详情</button>';
            window._lastScannedId = record.id;
            statusEl.textContent = '匹配成功！';
            scanLoopActive = false;
            return;
          } else {
            resultDiv.innerHTML =
              '<div class="scanned-number">' + escapeHtml(number) + '</div>' +
              '<div class="scan-no-match">未找到匹配记录</div>' +
              '<div style="font-size:13px;color:#999;margin-top:6px">该单号不在列表中，继续扫描...</div>';
            statusEl.textContent = '未匹配，继续扫描';
          }
        }
      }
    }).catch(function(e) {
      // Detection frame error, retry next tick
    });

    // Safety limit: stop after ~30 seconds
    if (scanCount > 100) {
      resultDiv.innerHTML = '<div style="color:#999">扫码超时，请点击关闭后重试</div>';
      scanLoopActive = false;
      return;
    }

    setTimeout(tick, 300);
  }

  tick();
}

function showMatchedRecord() {
  if (window._lastScannedId) {
    stopScanner();
    showDetail(window._lastScannedId);
  }
}

</script>
</body>
